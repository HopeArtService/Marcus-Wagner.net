<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner - Businesscard</title>
<link rel="stylesheet" href="style.css">

<style>

.info-row{
display:flex;
gap:15px;
flex-wrap:wrap;
}

/* Navigation unten auf der Karte */

.card-nav{
margin-top:25px;
display:flex;
justify-content:space-between;
}

.card-nav a{
text-decoration:none;
color:#0000ff;
font-weight:bold;
letter-spacing:1px;
}

.card-nav a:hover{
text-decoration:underline;
}

</style>

</head>
    
<body>

<div class="card">

<h1>Marcus Wagner</h1>
<h2>Artist</h2>

<div class="info-row">
<span>marcuswagnerinfo@gmail.com</span>
<span>+43 ...</span>
<span>www.marcus-wagner.net</span>
</div>

<div class="card-nav">
<a href="cv.html">Bio</a>
<a href="art.html">Kunst</a>
</div>

</div>
  
<img id="blinkImage" class="blink-img">

<script>

const images = [
"src/bilder_weboptimiert_background/20251006MarcusWagner4709.jpg",
"src/bilder_weboptimiert_background/20251006MarcusWagner4717.jpg",
"src/bilder_weboptimiert_background/Scan-10.jpg",
"src/bilder_weboptimiert_background/Scan-3.jpg",
"src/bilder_weboptimiert_background/maske.jpg"
];

const img = document.getElementById("blinkImage");
const card = document.querySelector(".card");

const margin = 40;
const displayTime = 1400;
const intervalTime = 2000;

const preloaded = [];
images.forEach(src=>{
const i = new Image();
i.src = src;
preloaded.push(i);
});

function shuffleArray(arr){
for(let i = arr.length - 1; i > 0; i--){
const j = Math.floor(Math.random()*(i+1));
[arr[i],arr[j]] = [arr[j],arr[i]];
}
}

function getRandomPosition(size){

const rect = card.getBoundingClientRect();
let x,y;

do{

x = Math.random()*(window.innerWidth - size);
y = Math.random()*(window.innerHeight - size);

}while(

x + size > rect.left - margin &&
x < rect.right + margin &&
y + size > rect.top - margin &&
y < rect.bottom + margin

);

return {x,y};

}

let queue = [...images];
shuffleArray(queue);

function showNext(){

if(queue.length === 0){
queue = [...images];
shuffleArray(queue);
}

const next = queue.shift();

const maxSize = Math.min(window.innerWidth*0.35,220);
const size = Math.random()*(maxSize-100)+100;

const pos = getRandomPosition(size);

img.style.opacity = 0;

setTimeout(()=>{

img.src = next;
img.style.width = size+"px";
img.style.left = pos.x+"px";
img.style.top = pos.y+"px";
img.style.opacity = 1;

setTimeout(()=>{
img.style.opacity = 0;
},displayTime);

},80);

}

showNext();
setInterval(showNext,intervalTime);

</script>

</body>
</html>
