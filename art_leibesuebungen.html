<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner – Kunst</title>

<style>
body {
    background-color: #00ffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace;
    margin:0;
}

.card {
    width: 350px;
    max-height: 600px;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: relative;
    overflow-y: auto;
    text-align: center;
}

.card h1 {
    font-size: 24px;
    margin: 0;
    color: #000080;
    text-shadow: 1px 1px #fff;
}

.card h2 {
    font-size: 16px;
    margin: 5px 0 15px;
    color: #ff0000;
}

.card p {
    font-size:14px;
    margin:5px 0;
}

/* Scrollbar */
.card::-webkit-scrollbar { width: 8px; }
.card::-webkit-scrollbar-track { background: #ffcc00; }
.card::-webkit-scrollbar-thumb { background: #0000ff; border:1px solid #000; }

.invisible-link {
    color: inherit;
    text-decoration: none;
}
.invisible-link:hover { text-decoration: underline; }

/* Bilder in voller Breite innerhalb der Karte */
.card img {
    width: 95%;
    margin: 10px 0;
    border: 3px solid #0000ff;
    box-shadow: 2px 2px 0 #ff00ff;
    cursor: pointer;
    object-fit: cover;
}

/* Overlay für vergrößertes Bild */
#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background: rgba(0,0,0,0.8);
    display:none;
    justify-content: center;
    align-items: center;
    z-index:1000;
}
#overlay img {
    max-width: 90%;
    max-height: 90%;
    box-shadow: 0 0 20px #fff;
    border: 5px solid #fff;
    border-radius: 5px;
}
.work {
    text-align: left;      /* Link linksbündig unter dem Bild */
    margin-bottom: 15px;   /* Abstand zu nächstem Bild */
}

.work img {
    display: block;        /* verhindert, dass der Link neben dem Bild erscheint */
    width: 95%;
    margin-bottom: 5px;    /* kleiner Abstand zwischen Bild und Link */
}

.work a {
    text-decoration: none;
    color: #0000ff;        /* Linkfarbe anpassen */
    font-size: 14px;
}

.work a:hover {
    text-decoration: underline;
}
    
</style>
</head>
<body>

<div class="card">
    <h1>Painting Compilation</h1>
    <h2>2026, University of Applied Arts Vienna</h2>

    <!-- Bilder in voller Breite -->
    <img src="src/leibesuebungen/install1.jpg" alt="Artwork 1">
    <img src="src/leibesuebungen/install2.jpg">
    <img src="src/leibesuebungen/install3.jpg">
    <img src="src/leibesuebungen/install4.jpg" alt="Artwork 1">
    <img src="src/leibesuebungen/install5.jpg" alt="Artwork 1">
    <img src="src/leibesuebungen/install6.jpg">
    <img src="src/leibesuebungen/install7.jpg" alt="Artwork 1">
    <img src="src/leibesuebungen/install8.jpg" alt="Artwork 1">
    <p></p>

    <p><a href="index.html" class="invisible-link">← Back</a></p>
</div>

<!-- Overlay für vergrößertes Bild -->
<div id="overlay">
    <img src="" alt="Vergrößertes Bild">
</div>

<script>
const overlay = document.getElementById("overlay");
const overlayImg = overlay.querySelector("img");

const images = Array.from(document.querySelectorAll(".card img"));
let currentIndex = 0;

function showImage(index){
    currentIndex = index;
    overlayImg.src = images[currentIndex].src;
    overlay.style.display = "flex";
}

// Bild anklicken → öffnen
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        showImage(index);
    });
});

// nächstes Bild
function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    overlayImg.src = images[currentIndex].src;
}

// vorheriges Bild
function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    overlayImg.src = images[currentIndex].src;
}

// Klick links / rechts
overlay.addEventListener("click", (e) => {

    const x = e.clientX;

    if(x < window.innerWidth / 2){
        prevImage();
    } else {
        nextImage();
    }

});

// Tastatursteuerung
document.addEventListener("keydown", (e) => {

    if(overlay.style.display !== "flex") return;

    if(e.key === "ArrowRight") nextImage();
    if(e.key === "ArrowLeft") prevImage();
    if(e.key === "Escape") overlay.style.display = "none";

});
</script>

</body>
</html>
