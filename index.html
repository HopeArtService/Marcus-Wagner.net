<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Fullscreen</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  position: relative;
}

/* Full-width top image behind content */
.top-center-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  z-index: 0; /* image behind */
}

/* Links container on top of image */
.links {
  position: relative;
  z-index: 1; /* in front of image */
  margin-top: 20px; /* adjust spacing from top */
}

/* Individual links styling */
.links a {
  display: inline-block;
  margin: 5px 15px;
  padding: 8px 15px;
  font-size: 1.2rem;
  text-decoration: none;
  color: white; /* better contrast over image */
  background: rgba(0,0,0,0.5); /* semi-transparent background */
  border-radius: 5px;
  transition: background 0.3s, color 0.3s;
}

.links a:hover {
  background: rgba(255,255,255,0.7);
  color: black;
}
</style>
</head>

<body>

<!-- Links over the image -->
<div class="links">
  <a href="src/marcus_wagner_portfolio_2026_deutsch.pdf" target="_blank">
    Open PDF Fullscreen
  </a>
  <a href="mailto:marcuswagnerinfo@gmail.com">
    Send Email
  </a>
</div>

<!-- Top center full-width image -->
<img src="src/ternitzportrait2.jpg" class="top-center-img" alt="Portrait">

</body>
</html>
