<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Fullscreen with Email</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  /* Optional: Email link overlay */
  .email-link {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.8);
    padding: 8px 12px;
    text-decoration: none;
    color: black;
    font-family: sans-serif;
    border-radius: 4px;
  }
</style>
</head>
<body>

<!-- PDF fullscreen -->
<iframe src="src/marcus_wagner_portfolio_2026_deutsch.pdf"></iframe>

<!-- Email link on top -->
<a class="email-link" href="mailto:example@example.com">Send Email</a>

</body>
</html>
