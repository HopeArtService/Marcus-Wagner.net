<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen PDF Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
  }
  #pdf-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #333;
    position: relative;
  }
  canvas {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
  /* Email link overlay */
  .email-link {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.8);
    padding: 8px 12px;
    text-decoration: none;
    color: black;
    border-radius: 4px;
    z-index: 1000;
  }
</style>
</head>
<body>

<div id="pdf-container"></div>
<a class="email-link" href="mailto:marcuswagnerinfo@.com">Send Email</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.101/pdf.min.js"></script>
<script>
const url = 'src/marcus_wagner_portfolio_2026_deutsch.pdf'; // Path to your PDF
let pdfDoc = null;
let currentPage = 1;
const container = document.getElementById('pdf-container');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
container.appendChild(canvas);

// Load PDF
pdfjsLib.getDocument(url).promise.then(doc => {
    pdfDoc = doc;
    renderPage(currentPage);
});

// Render a page scaled to fit the container
function renderPage(pageNum) {
    pdfDoc.getPage(pageNum).then(page => {
        const viewport = page.getViewport({ scale: 1 });
        // Scale page to fit container
        const scale = Math.min(container.clientWidth/viewport.width, container.clientHeight/viewport.height);
        const scaledViewport = page.getViewport({ scale });
        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;
        page.render({ canvasContext: ctx, viewport: scaledViewport });
    });
}

// Next / Prev page
function nextPage() {
    if(currentPage < pdfDoc.numPages) {
        currentPage++;
        renderPage(currentPage);
    }
}
function prevPage() {
    if(currentPage > 1) {
        currentPage--;
        renderPage(currentPage);
    }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') nextPage();
    if(e.key === 'ArrowLeft') prevPage();
});

// Swipe support for mobile
let touchStartX = 0;
let touchEndX = 0;

container.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
});

container.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    if(touchEndX < touchStartX - 50) nextPage();
    if(touchEndX > touchStartX + 50) prevPage();
});
</script>

</body>
</html>
