<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Grid</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== Background ===== */
.top-center-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* ===== Contact ===== */
.links {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
}

.links a {
  padding: 10px 20px;
  font-size: 1rem;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.5);
}

/* ===== Featured (NEW WORK) ===== */
.featured {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;

  display: flex;
  gap: 20px;
}

.featured img {
  width: 220px;
  height: 300px;
  object-fit: cover;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* ===== Scroll Section ===== */
.scroll-section {
  position: relative;
  margin-top: 100vh; /* forces scroll */
  background: white;
  z-index: 2;
  padding-top: 40px;
}

/* ===== Gallery ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
}

.gallery img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  cursor: pointer;
}

/* ===== Fade-in effect ===== */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .featured {
    gap: 10px;
  }

  .featured img {
    width: 120px;
    height: 180px;
  }

  .gallery {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  }

  .gallery img {
    height: 120px;
  }
}

/* ===== Lightbox ===== */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<!-- Contact -->
<div class="links">
  <a href="info.html">Contact</a>
</div>

<!-- Background -->
<img src="src/ternitzportrait2.jpg" class="top-center-img">

<!-- ===== Featured Images (NEW WORK) ===== -->
<div class="featured">
  <img src="src/singing.JPG" onclick="openLightbox(this.src)">
  <img src="src/METEORID.jpg" onclick="openLightbox(this.src)">
  <img src="src/portrait2.jpg" onclick="openLightbox(this.src)">
</div>

<!-- ===== Scroll Section ===== -->
<div class="scroll-section">

  <div class="gallery fade" id="gallery">
    <img src="src/20251006MarcusWagner4709.jpg" onclick="openLightbox(this.src)">
    <img src="src/works_cover/leibes3.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild1.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild2.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild3.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild4.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild5.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild6.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild7.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild8.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild9.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild10.jpg" onclick="openLightbox(this.src)">
    <img src="src/bild11.jpg" onclick="openLightbox(this.src)">
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

/* ===== Fade-in on scroll ===== */
const gallery = document.getElementById("gallery");

window.addEventListener("scroll", () => {
  const rect = gallery.getBoundingClientRect();
  if (rect.top < window.innerHeight - 100) {
    gallery.classList.add("visible");
  }
});
</script>

</body>
</html>
