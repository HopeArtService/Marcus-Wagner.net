<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner - Businesscard</title>
<style>
body {
    background-color: #00ffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    min-height: 100vh;
    font-family: "Courier New", monospace;
    margin: 0;
}

.card {
    width: 350px;
    height: 200px;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: relative;
    z-index: 2; /* Links über blinkendem Bild */
}

.card h1 { font-size: 24px; margin: 0; color: #000080; text-shadow: 1px 1px #fff; }
.card h2 { font-size: 16px; margin: 5px 0 15px; color: #ff0000; }
.card p { font-size: 14px; margin: 2px 0; }

.card::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 3px dashed #00ff00;
    transform: rotate(15deg);
}

.invisible-link {
    color: inherit;
    text-decoration: none;
    cursor: pointer;
}

.invisible-link:hover {
    text-decoration: underline;
}


.blink-img {
    position: absolute;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 90vw;
    height: auto;
}    



}
    
</style>
</head>
<body>

<div class="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>
    <p>Email: marcuswagnerinfo@gmail.com</p>
    <p>Phone: +43 @marcuswagner.xd</p>
    <p>Website: www.marcus-wagner.net</p>
    <p><a href="cv.html" class="invisible-link">Bio</a></p>
    <p><a href="art.html" class="invisible-link">Kunst</a></p>
</div>
  
<img id="blinkImage" class="blink-img">

<script>
const images = [
    "src/Scan 5.jpg",
    "src/Scan 10.jpg",
    "src/maske.jpg",
    "src/scan_6.jpg",
    "src/Scan 3.jpg",
    "src/20251006MarcusWagner4709.jpg",
    "src/20251006MarcusWagner4717.jpg"
];

const img = document.getElementById("blinkImage");
const card = document.querySelector(".card");
const margin = 20;
const displayTime = 1500;
const intervalTime = 1700;

// Shuffle Funktion
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

// Position prüfen, dass kein Überlappen mit Karte
function getRandomPosition(size) {
    const rect = card.getBoundingClientRect();
    let x, y;
    do {
        x = Math.random() * (window.innerWidth - size);
        y = Math.random() * (window.innerHeight - size);
    } while (
        x + size > rect.left - margin &&
        x < rect.right + margin &&
        y + size > rect.top - margin &&
        y < rect.bottom + margin
    );
    return {x, y};
}

// Bilder in Shuffle-Reihenfolge anzeigen
let imageQueue = [...images];
shuffleArray(imageQueue);
let lastImage = null;

function showNextImage() {
    if (imageQueue.length === 0) {
        imageQueue = [...images];
        shuffleArray(imageQueue);
    }

    let nextImage = imageQueue.shift();

    if (nextImage === lastImage && imageQueue.length > 0) {
        imageQueue.push(nextImage);
        nextImage = imageQueue.shift();
    }
    lastImage = nextImage;

    img.src = nextImage;
 const maxSize = Math.min(window.innerWidth * 0.4, 250);
const size = Math.random() * (maxSize - 100) + 100;
    const pos = getRandomPosition(size);

    img.style.width = size + "px";
    img.style.left = pos.x + "px";
    img.style.top = pos.y + "px";

    img.style.opacity = 1;

    setTimeout(() => {
        img.style.opacity = 0;
    }, displayTime);
}

// Start Intervall
showNextImage();
setInterval(showNextImage, intervalTime);
</script>

</body>
</html>
