<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner - Businesscard</title>
<style>
/* Body for centering the card */
body {
    background-color: #00ffff; /* bright cyan background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace; /* classic pixel font feel */
    
}

/* The card itself */
.card {
    width: 350px;
    height: 200px;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: relative;
}

/* Name and title */
.card h1 {
    font-size: 24px;
    margin: 0;
    color: #000080;
    text-shadow: 1px 1px #fff;
}

.card h2 {
    font-size: 16px;
    margin: 5px 0 15px;
    color: #ff0000;
}

  

/* Contact info */
.card p {
    font-size: 14px;
    margin: 2px 0;
}

/* Decorative 90s box */
.card::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 3px dashed #00ff00;
    transform: rotate(15deg);
}

.invisible-link {
    color: inherit;           /* übernimmt die Textfarbe des umgebenden Textes */
    text-decoration: none;    /* entfernt Unterstreichung */
    cursor: pointer;          /* optional: zeigt beim Hover, dass es klickbar ist */
}

.invisible-link:hover {
    text-decoration: underline; /* optional: nur beim Hover sichtbar */
}

.blink-img {
    position: absolute;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.15s;
}
    
</style>
</head>
<body>

<div class="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>
    <p>Email: marcuswagnerinfo@gmail.com</p>
    <p>Phone: +43 @marcuswagner.xd</p>
    <p>Website: www.marcus-wagner.net</p>
    <p><a href="cv.html" class="invisible-link">Bio</a></p>
    <p><a href="https://drive.google.com/file/d/1X_fR6boAKGk2_Z-8O8EyrlMRoGeDKqxy/view?usp=sharing" class="invisible-link">Portfolio</a></p> 
    <p> <a href="https://www.hopeartservice.vip" class="invisible-link">&hearts;</a></p>
   
</div>

<img id="blinkImage" class="blink-img">

    <script>
const images = [
    "src/Scan 5.jpg",
    "src/Scan 10.jpg",
    "src/maske.jpg",
    "src/scan_6.jpg",
    "src/Scan 3.jpg",
    "src/20251006MarcusWagner4709.jpg",
    "src/20251006MarcusWagner4717.jpg"
];

const img = document.getElementById("blinkImage");
const card = document.querySelector(".card");
const margin = 20; 
const displayTime = 3000; // Bild sichtbar für 3 Sekunden
const intervalTime = 5000; // Abstand zwischen Bildwechseln
let lastIndex = -1; // merkt sich zuletzt angezeigtes Bild

function showImage() {
    // Zufälliges Bild auswählen, das nicht das gleiche wie zuletzt ist
    let randomIndex;
    do {
        randomIndex = Math.floor(Math.random() * images.length);
    } while (randomIndex === lastIndex);
    lastIndex = randomIndex;

    const randomImage = images[randomIndex];
    img.src = randomImage;

    // Zufällige Größe
    const size = Math.random() * 150 + 100;

    // Position zufällig, aber nicht über der Karte
    const rect = card.getBoundingClientRect();
    let x, y;

    do {
        x = Math.random() * (window.innerWidth - size);
        y = Math.random() * (window.innerHeight - size);
    } while (
        x + size > rect.left - margin &&
        x < rect.right + margin &&
        y + size > rect.top - margin &&
        y < rect.bottom + margin
    );

    img.style.width = size + "px";
    img.style.left = x + "px";
    img.style.top = y + "px";

    // Bild einblenden
    img.style.opacity = 1;

    // Nach displayTime ausblenden
    setTimeout(() => {
        img.style.opacity = 0;
    }, displayTime);
}

// Start Intervall: garantiert kein Überlappen
setInterval(showImage, intervalTime);
    </script>
</body>
</html>
