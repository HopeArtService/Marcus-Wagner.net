<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Fullscreen</title>

<style>
/* Remove default margin/padding */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Top center full-width image */
.top-center-img {
  position: fixed;  /* stays at the top */
  top: 0;
  left: 0;
  width: 100%;      /* full width */
  height: auto;     /* maintain aspect ratio */
  display: block;
  z-index: 1;       /* stays on top */
}

/* Links styling */
.links {
  margin-top: 250px; /* space below the image, adjust if needed */
}

.links a {
  display: block;
  margin: 10px 0;
  font-size: 1.2rem;
  text-decoration: none;
  color: black;
  transition: color 0.3s;
}

.links a:hover {
  color: #007BFF; /* hover color */
}
</style>
</head>

<body>

<!-- Top center full-width image -->
<img src="src/ternitzportrait2.jpg" class="top-center-img" alt="Portrait">

<!-- Links -->
<div class="links">
  <a href="src/marcus_wagner_portfolio_2026_deutsch.pdf" target="_blank">
    Open PDF Fullscreen
  </a>
  <a href="mailto:marcuswagnerinfo@gmail.com">
    Send Email
  </a>
</div>

</body>
</html>
