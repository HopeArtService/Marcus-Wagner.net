<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner - Businesscard</title>
<style>
body {
    background-color: #00ffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace;
    margin: 0;
    overflow: hidden;
}

.card {
    width: 350px;
    height: 200px;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: relative;
    z-index: 10;
}

.card h1 {
    font-size: 24px;
    margin: 0;
    color: #000080;
    text-shadow: 1px 1px #fff;
}

.card h2 {
    font-size: 16px;
    margin: 5px 0 15px;
    color: #ff0000;
}

.card p {
    font-size: 14px;
    margin: 4px 0;
}

.card::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 3px dashed #00ff00;
    transform: rotate(15deg);
}

.invisible-link {
    color: inherit;
    text-decoration: none;
}

.invisible-link:hover {
    text-decoration: underline;
}

.blink-img {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    max-width: 200px;
    max-height: 200px;
    z-index: 5;
}
</style>
</head>
<body>

<div class="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>
    <p>Email: marcuswagnerinfo@gmail.com</p>
    <p>Phone: +43 @marcuswagner.xd</p>
    <p>Website: www.marcus-wagner.net</p>
    <p><a href="cv.html" class="invisible-link">Bio</a></p>
    <p><a href="https://drive.google.com/file/d/1X_fR6boAKGk2_Z-8O8EyrlMRoGeDKqxy/view?usp=sharing" class="invisible-link">Portfolio</a></p>
    <p><a href="https://www.hopeartservice.vip" class="invisible-link">&hearts;</a></p>
</div>

<script>
const images = [
    "src/Scan 5.jpg",
    "src/Scan 10.jpg",
    "src/maske.jpg",
    "src/scan_6.jpg",
    "src/Scan 3.jpg",
    "src/20251006MarcusWagner4709.jpg",
    "src/20251006MarcusWagner4717.jpg"
];

const card = document.querySelector('.card');
const margin = 20;
const displayTime = 1300;
const intervalTime = 2000;

// Mobile Check
const isMobile = window.innerWidth <= 768;

function createBlinkImage() {
    const img = document.createElement('img');
    img.classList.add('blink-img');
    document.body.appendChild(img);

    // Starte Animation Zyklus
    setInterval(() => {
        const randomImage = images[Math.floor(Math.random() * images.length)];
        img.src = randomImage;

        const size = Math.random() * 200 + 50;

        let x, y;
        if (isMobile) {
            // Bilder nur innerhalb des sichtbaren Bildschirms
            x = Math.random() * (window.innerWidth - size);
            y = Math.random() * (window.innerHeight - size);
        } else {
            const rect = card.getBoundingClientRect();
            do {
                x = Math.random() * (window.innerWidth - size);
                y = Math.random() * (window.innerHeight - size);
            } while (
                x + size > rect.left - margin &&
                x < rect.right + margin &&
                y + size > rect.top - margin &&
                y < rect.bottom + margin
            );
        }

        img.style.width = size + 'px';
        img.style.left = x + 'px';
        img.style.top = y + 'px';

        img.style.opacity = 1;
        setTimeout(() => {
            img.style.opacity = 0;
        }, displayTime);

    }, intervalTime);
}

// Erstelle mehrere Bilder gleichzeitig für smoother Effekt
for (let i = 0; i < 3; i++) {
    createBlinkImage();
}
</script>

</body>
</html>
