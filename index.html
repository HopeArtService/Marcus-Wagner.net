<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marcus Wagner Galerie</title>

<style>
body{
    font-family: "Times New Roman", serif;
    background-color: white;
    color: red;
    margin: 0;
    text-align: center;
}

/* Galerie-Container */
.gallery{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px; /* Abstand zwischen Bildern */
    padding: 20px;
}

/* Kleine Vorschaubilder */
.gallery img{
    width: 150px;
    height: 100px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid red;
    border-radius: 5px;
    transition: transform 0.2s;
}

.gallery img:hover{
    transform: scale(1.05);
}

/* Lightbox (vergrößertes Bild) */
.lightbox{
    display: none; /* versteckt */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.lightbox img{
    max-width: 90%;
    max-height: 90%;
    border: 5px solid white;
    border-radius: 10px;
}

.close-btn{
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>MARCUS WAGNER GALERIE</h1>

<div class="gallery">
    <img src="https://via.placeholder.com/300x200?text=Bild+1" alt="Bild 1">
    <img src="https://via.placeholder.com/300x200?text=Bild+2" alt="Bild 2">
    <img src="https://via.placeholder.com/300x200?text=Bild+3" alt="Bild 3">
    <img src="https://via.placeholder.com/300x200?text=Bild+4" alt="Bild 4">
    <img src="https://via.placeholder.com/300x200?text=Bild+5" alt="Bild 5">
    <img src="https://via.placeholder.com/300x200?text=Bild+6" alt="Bild 6">
    <img src="https://via.placeholder.com/300x200?text=Bild+7" alt="Bild 7">
    <img src="https://via.placeholder.com/300x200?text=Bild+8" alt="Bild 8">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeBtn">&times;</span>
    <img id="lightboxImg" src="">
</div>

<script>
// Lightbox-Funktion
const galleryImages = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const closeBtn = document.getElementById('closeBtn');

galleryImages.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
    });
});

closeBtn.addEventListener('click', () => {
    lightbox.style.display = 'none';
});

// Klick außerhalb schließt Lightbox
lightbox.addEventListener('click', e => {
    if(e.target !== lightboxImg && e.target !== closeBtn){
        lightbox.style.display = 'none';
    }
});
</script>

</body>
</html>
