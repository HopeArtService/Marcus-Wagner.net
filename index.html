<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== HERO (scrolls normally) ===== */
.hero {
  position: relative;
  height: 120vh; /* taller so images fit nicely */
}

/* Background now SCROLLS */
.hero img.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Overlay layer */
.hero-content {
  position: absolute;
  inset: 0;

  display: flex;
  flex-direction: column;
  justify-content: flex-end; /* push to bottom */
  align-items: center;
  padding-bottom: 40px;
}

/* ===== Contact ===== */
.links {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.links a {
  padding: 8px 16px;
  font-size: 0.9rem;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.4);
}

/* ===== Featured images ===== */
.featured {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

.featured img {
  width: 260px;
  height: 360px;
  object-fit: cover;
  cursor: pointer;
}

/* ===== GALLERY ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
}

.gallery img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  cursor: pointer;
}

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .hero {
    height: 110vh;
  }

  .featured img {
    width: 160px;
    height: 220px;
  }

  .gallery {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  }

  .gallery img {
    height: 120px;
  }
}

/* ===== Lightbox ===== */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<!-- ===== HERO ===== -->
<div class="hero">

  <!-- Background -->
  <img src="src/ternitzportrait2.jpg" class="bg">

  <!-- Overlay content -->
  <div class="hero-content">

    <!-- Contact -->
    <div class="links">
      <a href="info.html">Contact</a>
    </div>

    <!-- Featured images -->
    <div class="featured">
      <img src="src/singing.JPG" onclick="openLightbox(this.src)">
      <img src="src/METEORID.jpg" onclick="openLightbox(this.src)">
      <img src="src/portrait2.jpg" onclick="openLightbox(this.src)">
    </div>

  </div>

</div>

<!-- ===== GALLERY (attached directly) ===== -->
<div class="gallery">
  <img src="src/20251006MarcusWagner4709.jpg" onclick="openLightbox(this.src)">
  <img src="src/works_cover/leibes3.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild1.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild2.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild3.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild4.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild5.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild6.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild7.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild8.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild9.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild10.jpg" onclick="openLightbox(this.src)">
  <img src="src/bild11.jpg" onclick="openLightbox(this.src)">
</div>

<!-- ===== Lightbox ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
