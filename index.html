<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie Overlay</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  position: relative;
}

/* Background image */
.top-center-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* Links */
.links {
  position: relative;
  z-index: 2;
  margin-top: 20px;
}

.links a {
  display: inline-block;
  margin: 5px 15px;
  padding: 8px 15px;
  font-size: 1.2rem;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.5);
  border-radius: 5px;
}

/* ===== Galerie rechts unten ===== */
.gallery {
  position: fixed;
  bottom: 80px;   /* Abstand nach unten */
  right: 40px;    /* Abstand nach rechts */
  z-index: 2;
  width: 300px;
  max-width: 80vw;
  cursor: pointer;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: opacity 0.3s ease;
}

/* kleines Hover-Feedback */
.gallery:hover img {
  opacity: 0.85;
}

/* Mobile */
@media (max-width: 768px) {
  .gallery {
    bottom: 60px;
    right: 20px;
    width: 70%;
  }
}
</style>
</head>

<body>

<div class="links">
  <a href="info.html">Contact</a>
</div>

<!-- Galerie -->
<div class="gallery" onclick="nextImage()">
  <img id="galleryImage" src="src/bild1.jpg">
</div>

<!-- Background -->
<img src="src/ternitzportrait2.jpg" class="top-center-img" alt="Portrait">

<script>
const images = [
  "src/Scan_6.jpg",
  "src/Scream.jpg",
  "src/leibes_4.jpg"
];

let current = 0;

function nextImage() {
  current++;
  if (current >= images.length) current = 0;

  const img = document.getElementById("galleryImage");
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = images[current];
    img.style.opacity = 1;
  }, 150);
}
</script>

</body>
</html>
