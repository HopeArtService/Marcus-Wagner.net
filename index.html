<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90s Business Card</title>
<style>
/* Body for centering the card */
body {
    background-color: #00ffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace;
    margin: 0;
}

/* The card itself */
.card {
    width: 90%; /* flexibel für mobile */
    max-width: 350px;
    height: auto; /* Höhe passt sich Text an */
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: relative;
    overflow-y: auto;
    box-sizing: border-box;
}

/* Name and title */
.card h1 {
    font-size: 6vw; /* passt sich Bildschirmbreite an */
    margin: 0;
    color: #000080;
    text-shadow: 1px 1px #fff;
}

.card h2 {
    font-size: 4vw;
    margin: 5px 0 15px;
    color: #ff0000;
}

/* Contact info */
.card p {
    font-size: 3.5vw;
    margin: 2px 0;
    line-height: 1.2;
    word-wrap: break-word;
}

/* Decorative 90s box */
.card::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 3px dashed #00ff00;
    transform: rotate(15deg);
}

/* Unsichtbare Links wie Text */
.invisible-link {
    color: inherit;
    text-decoration: none;
    cursor: pointer;
}

.invisible-link:hover {
    text-decoration: underline;
}

/* Blinking images */
.blink-img {
    position: absolute;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.35s ease;
    max-width: 30vw; /* Bilder auf mobile kleiner */
    max-height: 30vh;
}
</style>
</head>
<body>

<div class="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>
    <p>Email: marcuswagnerinfo@gmail.com</p>
    <p>Phone: +43 @marcuswagner.xd</p>
    <p>Website: www.marcus-wagner.net</p>
    
    <p><a href="cv.html" class="invisible-link">Bio</a></p>
    <p><a href="https://drive.google.com/file/d/1X_fR6boAKGk2_Z-8O8EyrlMRoGeDKqxy/view?usp=sharing" class="invisible-link">Portfolio</a></p> 
    <p><a href="https://www.hopeartservice.vip" class="invisible-link">&hearts;</a></p>
</div>

<img id="blinkImage" class="blink-img">

<script>
const images = [
    "src/Scan 5.jpg",
    "src/Scan 10.jpg",
    "src/maske.jpg",
    "src/scan_6.jpg",
    "src/Scan 3.jpg",
    "src/20251006MarcusWagner4709.jpg",
    "src/20251006MarcusWagner4717.jpg"
];

const img = document.getElementById("blinkImage");
const card = document.querySelector(".card");
const margin = 10; // kleinerer Abstand auf Handy
const displayTime = 1300;
const intervalTime = 2000;

function showImage() {
    const randomImage = images[Math.floor(Math.random() * images.length)];
    img.src = randomImage;

    // zufällige Größe, aber begrenzt für mobile
    const size = Math.min(Math.random() * 150 + 50, window.innerWidth * 0.3);

    const rect = card.getBoundingClientRect();
    let x, y;

    do {
        x = Math.random() * (window.innerWidth - size);
        y = Math.random() * (window.innerHeight - size);
    } while (
        x + size > rect.left - margin &&
        x < rect.right + margin &&
        y + size > rect.top - margin &&
        y < rect.bottom + margin
    );

    img.style.width = size + "px";
    img.style.left = x + "px";
    img.style.top = y + "px";

    img.style.opacity = 1;

    setTimeout(() => {
        img.style.opacity = 0;
    }, displayTime);
}

// Fester Zyklus
setInterval(showImage, intervalTime);
</script>

</body>
</html>
