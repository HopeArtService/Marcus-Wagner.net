<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrollable Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Hintergrund */
.top-center-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* Contact Button */
.links {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
}

.links a {
  padding: 10px 20px;
  font-size: 1.2rem;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.5);
}

/* ===== Galerie (scrollbar) ===== */
.gallery {
  position: relative;
  z-index: 2;
  margin-top: 100vh; /* startet unter dem Screen */
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  cursor: pointer;
}

/* ===== Lightbox ===== */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 5;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<div class="links">
  <a href="info.html">Contact</a>
</div>

<img src="src/ternitzportrait2.jpg" class="top-center-img">

<!-- Galerie -->
<div class="gallery">
  <img src="src/singing.JPG" onclick="openLightbox(this.src)">
  <img src="src/METEORID.jpg" onclick="openLightbox(this.src)">
  <img src="src/portrait2.jpg" onclick="openLightbox(this.src)">
  <img src="src/20251006MarcusWagner4709.jpg" onclick="openLightbox(this.src)">
  <img src="src/works_cover/leibes3.jpg" onclick="openLightbox(this.src)">

  <!-- einfach erweitern -->
  <img src="src/portrait2.jpg" onclick="openLightbox(this.src)">
  <img src="src/METEORID.jpg" onclick="openLightbox(this.src)">
  <img src="src/20251006MarcusWagner4709.jpg" onclick="openLightbox(this.src)">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
