<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner - Businesscard</title>
<link rel="stylesheet" href="style.css">
</head>
    
<body>

<div class="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>

    <div class="info-row">
        <span>Email</span>
        <span>marcuswagnerinfo@gmail.com</span>
    </div>

    <div class="info-row">
        <span>Phone</span>
        <span>+43 @marcuswagner.xd</span>
    </div>

    <div class="info-row">
        <span>Website</span>
        <span>www.marcus-wagner.net</span>
    </div>

    <div class="info-row">
        <span>Bio</span>
        <a href="cv.html" class="invisible-link">open</a>
    </div>

    <div class="info-row">
        <span>Kunst</span>
        <a href="art.html" class="invisible-link">open</a>
    </div>
</div>
  
<img id="blinkImage" class="blink-img">

<script>
const images = [
    "src/Scan 5.jpg",
    "src/Scan 10.jpg",
    "src/maske.jpg",
    "src/scan_6.jpg",
    "src/Scan 3.jpg",
    "src/20251006MarcusWagner4709.jpg",
    "src/20251006MarcusWagner4717.jpg"
];

const img = document.getElementById("blinkImage");
const card = document.querySelector(".card");

const margin = 40;
const displayTime = 1400;
const intervalTime = 2000;

function shuffleArray(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]] = [arr[j],arr[i]];
    }
}

function getRandomPosition(size){

    const rect = card.getBoundingClientRect();

    let x,y;

    do{
        x = Math.random()*(window.innerWidth - size);
        y = Math.random()*(window.innerHeight - size);
    }

    while(
        x + size > rect.left - margin &&
        x < rect.right + margin &&
        y + size > rect.top - margin &&
        y < rect.bottom + margin
    );

    return {x,y};
}

let queue = [...images];
shuffleArray(queue);

function showNext(){

    if(queue.length === 0){
        queue = [...images];
        shuffleArray(queue);
    }

    const next = queue.shift();

    const maxSize = Math.min(window.innerWidth*0.35,220);
    const size = Math.random()*(maxSize-100)+100;

    const pos = getRandomPosition(size);

    img.src = next;

    img.style.width = size+"px";
    img.style.left = pos.x+"px";
    img.style.top = pos.y+"px";

    img.style.opacity = 1;

    setTimeout(()=>{
        img.style.opacity = 0;
    },displayTime);
}

showNext();
setInterval(showNext,intervalTime);
</script>

</body>
</html>
