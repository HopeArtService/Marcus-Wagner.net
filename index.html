<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90s Business Card</title>
<style>
/* Body for centering the card */
body {
    background-color: #00ffff; /* bright cyan background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace; /* classic pixel font feel */
}

/* The card itself */
.card {
    width: 350px;
    height: 200px;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: relative;
}

/* Name and title */
.card h1 {
    font-size: 24px;
    margin: 0;
    color: #000080;
    text-shadow: 1px 1px #fff;
}

.card h2 {
    font-size: 16px;
    margin: 5px 0 15px;
    color: #ff0000;
}

  

/* Contact info */
.card p {
    font-size: 14px;
    margin: 2px 0;
}

/* Decorative 90s box */
.card::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 3px dashed #00ff00;
    transform: rotate(15deg);
}
</style>
</head>
<body>

<div class="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>
    <p>Email: marcuswagnerinfo@gmail.com</p>
    <p>Phone: +43 secret</p>
    <p>Website: www.marcus-wagner.net</p>
    <p>Visit Portfolio: <a href="https://drive.google.com/file/d/1X_fR6boAKGk2_Z-8O8EyrlMRoGeDKqxy/view?usp=sharing">Here</a></p>
</div>

</body>
</html>
