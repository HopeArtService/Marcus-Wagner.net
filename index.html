<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie Overlay</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  position: relative;
}

/* Background image */
.top-center-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* Links */
.links {
  position: relative;
  z-index: 2;
  margin-top: 20px;
}

.links a {
  display: inline-block;
  margin: 5px 15px;
  padding: 8px 15px;
  font-size: 1.2rem;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.5);
  border-radius: 5px;
}

.links a:hover {
  background: rgba(255,255,255,0.7);
  color: black;
}

/* ===== Galerie ===== */
.gallery {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 80%;
  max-width: 600px;
  overflow: hidden;
}

.gallery-track {
  display: flex;
  transition: transform 0.5s ease;
}

.gallery img {
  width: 100%;
  flex-shrink: 0;
  border-radius: 10px;
}

/* Navigation Buttons */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  color: white;
  background: rgba(0,0,0,0.5);
  border: none;
  padding: 10px;
  cursor: pointer;
  z-index: 3;
}

.nav.left {
  left: 10px;
}

.nav.right {
  right: 10px;
}

.nav:hover {
  background: rgba(255,255,255,0.7);
  color: black;
}

/* Mobile */
@media (max-width: 768px) {
  .gallery {
    width: 95%;
  }
}
</style>
</head>

<body>

<div class="links">
  <a href="info.html">Contact</a>
</div>

<!-- Galerie -->
<div class="gallery">
  <button class="nav left" onclick="moveSlide(-1)">❮</button>

  <div class="gallery-track" id="track">
    <img src="src/bild1.jpg">
    <img src="src/bild2.jpg">
    <img src="src/bild3.jpg">
  </div>

  <button class="nav right" onclick="moveSlide(1)">❯</button>
</div>

<!-- Background -->
<img src="src/ternitzportrait2.jpg" class="top-center-img" alt="Portrait">

<script>
let index = 0;

function moveSlide(direction) {
  const track = document.getElementById("track");
  const slides = track.children;
  const total = slides.length;

  index += direction;

  if (index < 0) index = total - 1;
  if (index >= total) index = 0;

  track.style.transform = "translateX(-" + (index * 100) + "%)";
}
</script>

</body>
</html>
