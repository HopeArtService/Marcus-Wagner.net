<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Wagner - Businesscard</title>
<style>
  body{  
background-color: #00ffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace;
    margin: 0;
    overflow: hidden;
}

.card {
    width: 350px; /* ursprüngliche Breite wiederhergestellt */
    height: 200px; /* ursprüngliche Höhe */
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: 3px solid #0000ff;
    box-shadow: 5px 5px 0 #ff00ff;
    padding: 20px;
    color: #000;
    position: absolute; /* damit es beweglich ist */
    z-index: 10;
    box-sizing: border-box;
    cursor: grab;
}

.card h1 {
    font-size: 24px;
    margin: 0;
    color: #000080;
    text-shadow: 1px 1px #fff;
}

.card h2 {
    font-size: 16px;
    margin: 5px 0 15px;
    color: #ff0000;
}

.card p {
    font-size: 14px;
    margin: 4px 0;
}

.card::after {
    content: "";
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 3px dashed #00ff00;
    transform: rotate(15deg);
}

.invisible-link {
    color: inherit;
    text-decoration: none;
}

.invisible-link:hover {
    text-decoration: underline;
}

.blink-img {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 5;
}
    
/* Mobile Anpassung: Abstand an den Seiten */
@media (max-width: 768px) {
    body {
        padding: 0 15px; /* Abstand links/rechts */
        box-sizing: border-box;
    }
    .card {
        width: 350px; /* gleiche Breite wie Desktop */
        max-width: calc(100% - 30px); /* damit es auf kleinen Bildschirmen nicht über den Rand geht */
    }
} 
}   
</style>
</head>
<body>

<div class="card" id="card">
    <h1>Marcus Wagner</h1>
    <h2>Artist</h2>
    <p>Email: marcuswagnerinfo@gmail.com</p>
    <p>Phone: +43 @marcuswagner.xd</p>
    <p>Website: www.marcus-wagner.net</p>
    <p><a href="cv.html" class="invisible-link">Bio</a></p>
    <p><a href="https://drive.google.com/file/d/1X_fR6boAKGk2_Z-8O8EyrlMRoGeDKqxy/view?usp=sharing" class="invisible-link">Portfolio</a></p>
    <p><a href="https://www.hopeartservice.vip" class="invisible-link">&hearts;</a></p>
</div>

<img id="blinkImage" class="blink-img">

<script>
const images = [
    "src/Scan 5.jpg",
    "src/Scan 10.jpg",
    "src/maske.jpg",
    "src/scan_6.jpg",
    "src/Scan 3.jpg",
    "src/20251006MarcusWagner4709.jpg",
    "src/20251006MarcusWagner4717.jpg"
];

const img = document.getElementById("blinkImage");
const card = document.getElementById("card");
const displayTime = 1300;
const intervalTime = 2000;
const margin = 20;
const isMobile = window.innerWidth <= 768;

let areaIndex = 0;

// Funktion: nächster Bereich rund um Karte
function getNextArea() {
    const rect = card.getBoundingClientRect();
    const safeMargin = 20;
    const maxX = window.innerWidth - safeMargin;
    const maxY = window.innerHeight - safeMargin;
    const minX = safeMargin;
    const minY = safeMargin;

    const areas = [
        {xMin: rect.left - margin, xMax: rect.right + margin, yMin: minY, yMax: rect.top - margin},      // oben
        {xMin: rect.right + margin, xMax: maxX, yMin: minY, yMax: maxY},                                  // rechts
        {xMin: rect.left - margin, xMax: rect.right + margin, yMin: rect.bottom + margin, yMax: maxY},  // unten
        {xMin: minX, xMax: rect.left - margin, yMin: minY, yMax: maxY}                                    // links
    ];

    const area = areas[areaIndex % areas.length];
    areaIndex++;
    return area;
}

// Zeige nächstes Bild (wartet, bis vorheriges verschwunden ist)
function showNextImage() {
    const randomImage = images[Math.floor(Math.random() * images.length)];
    img.src = randomImage;
    const size = Math.random() * 200 + 50;
    let position;

    if (isMobile) {
        position = {
            x: Math.random() * (window.innerWidth - size - 30) + 15,
            y: Math.random() * (window.innerHeight - size - 30) + 15
        };
    } else {
        const area = getNextArea();
        position = {
            x: Math.random() * (area.xMax - area.xMin - size) + area.xMin,
            y: Math.random() * (area.yMax - area.yMin - size) + area.yMin
        };
    }

    img.style.width = size + "px";
    img.style.left = position.x + "px";
    img.style.top = position.y + "px";
    img.style.opacity = 1;

    // erst nach displayTime das nächste Bild anzeigen
    setTimeout(() => {
        img.style.opacity = 0;
        setTimeout(showNextImage, intervalTime - displayTime);
    }, displayTime);
}

// Start
showNextImage();

// --- Drag & Drop für Mobile ---
let isDragging = false;
let offsetX, offsetY;

card.addEventListener("touchstart", function(e) {
    isDragging = true;
    const touch = e.touches[0];
    const rect = card.getBoundingClientRect();
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;
}, {passive: true});

card.addEventListener("touchmove", function(e) {
    if (!isDragging) return;
    const touch = e.touches[0];
    let x = touch.clientX - offsetX;
    let y = touch.clientY - offsetY;

    // Begrenzung innerhalb des Bildschirms
    x = Math.max(0, Math.min(window.innerWidth - card.offsetWidth, x));
    y = Math.max(0, Math.min(window.innerHeight - card.offsetHeight, y));

    card.style.left = x + "px";
    card.style.top = y + "px";
}, {passive: true});

card.addEventListener("touchend", function() {
    isDragging = false;
});
</script>

</body>
</html>
