<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottom Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Hintergrund */
.top-center-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* ===== Galerie unten ===== */
.gallery-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  z-index: 2;
}

.gallery-bar img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  cursor: pointer;
  flex: 1;
}

/* ===== Lightbox ===== */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 5;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* schließen beim hover Hinweis */
.lightbox::after {
  content: "Klicken zum Schließen";
  position: absolute;
  bottom: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- Hintergrund -->
<img src="src/ternitzportrait2.jpg" class="top-center-img">

<!-- Galerie -->
<div class="gallery-bar">
  <img src="src/singing.JPG" onclick="openLightbox(this.src)">
  <img src="src/METEORID.jpg" onclick="openLightbox(this.src)">
  <img src="src/portrait2.jpg" onclick="openLightbox(this.src)">
  <img src="src/20251006MarcusWagner4709.jpg" onclick="openLightbox(this.src)">
    <img src="src/works_cover/leibes3.jpg" onclick="openLightbox(this.src)">

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
